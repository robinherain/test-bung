<!DOCTYPE html>
<html lang="de">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;

      height: auto;
      display: block;
      margin-top: 15px;
    }

    .quelle {
      margin-top: 10px;
      font-size: 14px;
    }

</head>

  <h1>Medienseite</h1>

  <p>
    Dieses Bild zeigt eine Person mit freier Creative-Commons-Lizenz.

  <p class="quelle">
